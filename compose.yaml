version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smartmeal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mockserver:
    build:
      context: ./SmartMeal.MockServer
      dockerfile: Dockerfile
    container_name: smartmeal-mockserver
    restart: unless-stopped
    ports:
      - "${MOCKSERVER_HTTP_PORT}:5000"
      - "${MOCKSERVER_GRPC_PORT}:50051"
    depends_on:
      - postgres
    environment:
      - ASPNETCORE_URLS=http://+:8080

volumes:
  postgres_data: